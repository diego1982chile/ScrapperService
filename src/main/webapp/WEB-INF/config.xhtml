<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html" xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">


    <div id="layout-config" class="layout-config">
        <div class="layout-config-content">
            <a href="#" id="layout-config-button" class="layout-config-button">
                <i class="material-icons">settings</i>
            </a>
            <a href="#" class="layout-config-close">
                <i class="material-icons">clear</i>
            </a>
            <h:form id="config-form">
                <f:attribute name="badge" value="5" />
                <p:tabView id="config-form-tabs">
                    <p:tab title="Logs">

                        <p:outputPanel id="logs" styleClass="logs ui-g dashboard">
                            <div class="timeline ui-fluid" style="width: 100%">
                                <div class="ui-g">
                                    <p:outputPanel styleClass="logs ui-g dashboard" rendered="#{scrapBean.logHelper.logs.isEmpty()}">
                                        <h3 style="color: #757575a1">No hay logs disponibles</h3>
                                    </p:outputPanel>
                                    <p:repeat value="#{scrapBean.logHelper.logs}" var="log">
                                        <div class="ui-g-3 ui-md-2 ui-lg-2">
                                            <span class="event-time" style="padding-right: 15px; float: right; padding-top: 11px; color: #757575">#{log.timestamp}</span>
                                            <p:outputPanel rendered="#{log.level == 'INFO'}">
                                                <i class="fa fa-lg fa-info-circle" style="font-size:36px;color:#5180ceb3;top:20px"/>
                                            </p:outputPanel>
                                            <p:outputPanel rendered="#{log.level == 'WARNING'}">
                                                <i class="fa fa-lg fa-warning" style="font-size:36px;color:#ffc107ad;top:20px"/>
                                            </p:outputPanel>
                                            <p:outputPanel rendered="#{log.level == 'ERROR'}">
                                                <i class="ui-icon ui-icon-cancel" style="font-size:36px;color:#ff5722a6;top:20px"/>
                                            </p:outputPanel>
                                        </div>
                                        <div class="ui-g-9 ui-md-10 ui-lg-10">
                                            <span class="event-owner" style="color:#009688; margin: 0px">#{log.method}</span>
                                            <span class="event-text" style="padding-bottom: 2px; margin: 0px">#{log.classname}</span>
                                            <div class="event-content" style="font-size: small; margin: 0px">
                                                #{log.message}
                                            </div>
                                        </div>
                                    </p:repeat>
                                </div>
                            </div>
                        </p:outputPanel>
                    </p:tab>
                </p:tabView>
            </h:form>
        </div>
    </div>
</ui:composition>
